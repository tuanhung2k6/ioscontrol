<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; background: #1e1e2e; font-family: -apple-system, sans-serif; }
      #editor { width: 100%; height: 100%; }

      /* ── Loading overlay ── */
      #loading {
        position: fixed; inset: 0;
        background: #1e1e2e;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 100;
        transition: opacity 0.3s;
      }
      #loading.hidden { opacity: 0; pointer-events: none; }
      .spinner {
        width: 36px; height: 36px;
        border: 3px solid rgba(255,255,255,0.12);
        border-top-color: #7c7fdb;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 12px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #loading p { color: rgba(255,255,255,0.4); font-size: 13px; }

      /* ── Textarea fallback editor ── */
      #fallback {
        display: none;
        width: 100%; height: 100%;
        position: absolute; inset: 0;
        background: #1e1e2e;
        padding: 8px;
      }
      #fallback textarea {
        width: 100%; height: 100%;
        background: transparent;
        color: #cdd6f4;
        font-family: Menlo, 'Courier New', monospace;
        font-size: 13px;
        line-height: 1.6;
        border: none;
        outline: none;
        resize: none;
        caret-color: #f5e0dc;
        -webkit-appearance: none;
        padding: 4px;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    </style>
  </head>
  <body>
    <!-- Loading spinner -->
    <div id="loading">
      <div class="spinner"></div>
      <p>Loading editor…</p>
    </div>

    <!-- Monaco container -->
    <div id="editor"></div>

    <!-- Fallback textarea (shown if Monaco fails) -->
    <div id="fallback">
      <textarea id="fallbackTA" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script>
      var _monacoLoaded = false;
      var _fallbackMode = false;
      var _pendingCode = "";

      // ── Timeout: if Monaco not ready in 5s → use textarea ──
      var _loadTimer = setTimeout(function() {
        if (!_monacoLoaded) activateFallback();
      }, 5000);

      function activateFallback() {
        _fallbackMode = true;
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('fallback').style.display = 'block';
        var ta = document.getElementById('fallbackTA');
        if (_pendingCode) ta.value = _pendingCode;
        ta.addEventListener('input', function() {
          window.webkit.messageHandlers.codeChanged.postMessage(ta.value);
        });
        // Notify native we're ready (fallback mode)
        window.webkit.messageHandlers.editorReady.postMessage("ready");
      }

      // ── Monaco setup ──
      var LUA_LANGUAGE = {
        defaultToken: "", tokenPostfix: ".lua",
        keywords: ["and","break","do","else","elseif","end","false","for","function",
                   "goto","if","in","local","nil","not","or","repeat","return","then","true","until","while"],
        brackets: [
          { open: "{", close: "}", token: "delimiter.bracket" },
          { open: "[", close: "]", token: "delimiter.array" },
          { open: "(", close: ")", token: "delimiter.parenthesis" }
        ],
        tokenizer: {
          root: [
            [/--\[([=]*)\[/, { token: "comment", next: "@mlcomment.$1" }],
            [/--.*$/, "comment"],
            [/\[([=]*)\[/, { token: "string", next: "@mlstring.$1" }],
            [/"([^"\\]|\\.)*$/, "string.invalid"],
            [/'([^'\\]|\\.)*$/, "string.invalid"],
            [/"/, "string", "@string_double"],
            [/'/, "string", "@string_single"],
            [/[a-zA-Z_]\w*/, { cases: { "@keywords": { token: "keyword.$0" }, "@default": "identifier" } }],
            [/\d*\.\d+([eE][\-+]?\d+)?/, "number.float"],
            [/0[xX][0-9a-fA-F]+/, "number.hex"],
            [/\d+/, "number"],
            [/[;,.]/, "delimiter"],
            [/[{}()\[\]]/, "@brackets"],
            [/[<>]=?|[~=]=|\.\.\.|[+\-*\/%^#]/, "operator"]
          ],
          mlcomment: [[/[^\]]+/, "comment"],[/\]([=]*)\]/, { cases: { "$1==$S2": { token: "comment", next: "@pop" }, "@default": "comment" } }],[/./, "comment"]],
          mlstring:  [[/[^\]]+/, "string"],[/\]([=]*)\]/, { cases: { "$1==$S2": { token: "string", next: "@pop" }, "@default": "string" } }],[/./, "string"]],
          string_double: [[/[^\\"]+/, "string"],[/\\./, "string.escape"],[/"/, "string", "@pop"]],
          string_single: [[/[^\\']+/, "string"],[/\\./, "string.escape"],[/'/, "string", "@pop"]]
        }
      };

      var API_COMPLETIONS = [
        { label:"tap",  kind:1, detail:"tap(x, y)", insertText:"tap(${1:x}, ${2:y})", insertTextRules:4 },
        { label:"doubleTap", kind:1, detail:"doubleTap(x, y)", insertText:"doubleTap(${1:x}, ${2:y})", insertTextRules:4 },
        { label:"swipe", kind:1, detail:"swipe(x1,y1,x2,y2,dur)", insertText:"swipe(${1:x1},${2:y1},${3:x2},${4:y2},${5:500})", insertTextRules:4 },
        { label:"typeText", kind:1, detail:"typeText(text)", insertText:'typeText("${1:text}")', insertTextRules:4 },
        { label:"sleep", kind:1, detail:"sleep(ms)", insertText:"sleep(${1:1000})", insertTextRules:4 },
        { label:"log", kind:1, detail:"log(msg)", insertText:'log("${1:msg}")', insertTextRules:4 },
        { label:"screenshot", kind:1, detail:"screenshot()", insertText:"screenshot()", insertTextRules:4 },
        { label:"getForegroundApp", kind:1, detail:"getForegroundApp()", insertText:"getForegroundApp()", insertTextRules:4 },
        { label:"openApp", kind:1, detail:"openApp(bundleId)", insertText:'openApp("${1:com.app.id}")', insertTextRules:4 },
        { label:"killApp", kind:1, detail:"killApp(bundleId)", insertText:'killApp("${1:com.app.id}")', insertTextRules:4 },
        { label:"getPixelColor", kind:1, detail:"getPixelColor(x,y)", insertText:"getPixelColor(${1:x},${2:y})", insertTextRules:4 },
        { label:"findColor", kind:1, detail:"findColor(hex,region)", insertText:'findColor("${1:#FFFFFF}")', insertTextRules:4 },
        { label:"pressVolume", kind:1, detail:"pressVolume(dir)", insertText:'pressVolume("${1|up,down|}")', insertTextRules:4 }
      ];

      if (typeof require !== 'undefined') {
        require.config({ paths: { vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs" } });
        require(["vs/editor/editor.main"], function() {
          clearTimeout(_loadTimer);
          _monacoLoaded = true;

          monaco.languages.register({ id: "lua" });
          monaco.languages.setMonarchTokensProvider("lua", LUA_LANGUAGE);

          monaco.editor.defineTheme("ioscontrol-dark", {
            base: "vs-dark", inherit: true,
            rules: [
              { token:"comment",    foreground:"6A9955", fontStyle:"italic" },
              { token:"keyword",    foreground:"C586C0" },
              { token:"string",     foreground:"CE9178" },
              { token:"number",     foreground:"B5CEA8" },
              { token:"identifier", foreground:"9CDCFE" },
              { token:"operator",   foreground:"D4D4D4" },
              { token:"delimiter",  foreground:"D4D4D4" }
            ],
            colors: {
              "editor.background":                "#1e1e2e",
              "editor.foreground":                "#cdd6f4",
              "editorLineNumber.foreground":      "#585b70",
              "editorLineNumber.activeForeground":"#cdd6f4",
              "editor.lineHighlightBackground":   "#2a2b3d",
              "editorCursor.foreground":          "#f5e0dc",
              "editor.selectionBackground":       "#45475a80",
              "minimap.background":               "#1e1e2e"
            }
          });

          monaco.languages.registerCompletionItemProvider("lua", {
            provideCompletionItems: function(model, position) {
              var word = model.getWordUntilPosition(position);
              var range = { startLineNumber: position.lineNumber, endLineNumber: position.lineNumber, startColumn: word.startColumn, endColumn: word.endColumn };
              return { suggestions: API_COMPLETIONS.map(function(c) { return Object.assign({}, c, { range: range }); }) };
            }
          });

          window._editor = monaco.editor.create(document.getElementById("editor"), {
            value: _pendingCode,
            language: "lua",
            theme: "ioscontrol-dark",
            fontSize: 13,
            fontFamily: "Menlo, monospace",
            minimap: { enabled: true, maxColumn: 60 },
            lineNumbers: "on",
            roundedSelection: true,
            scrollBeyondLastLine: false,
            automaticLayout: true,
            tabSize: 2,
            wordWrap: "on",
            scrollbar: { verticalScrollbarSize: 6 },
            padding: { top: 8, bottom: 8 },
            suggest: { showWords: false },
            quickSuggestions: true
          });

          // Hide loading overlay
          document.getElementById('loading').classList.add('hidden');

          // Notify native
          window.webkit.messageHandlers.editorReady.postMessage("ready");

          // Change listener
          window._editor.onDidChangeModelContent(function() {
            window.webkit.messageHandlers.codeChanged.postMessage(window._editor.getValue());
          });
        });
      } else {
        // loader.js not available → immediate fallback
        clearTimeout(_loadTimer);
        activateFallback();
      }

      // ── Bridge functions (called from native ObjC) ──
      function setCode(code) {
        _pendingCode = code;
        if (_fallbackMode) {
          document.getElementById('fallbackTA').value = code;
        } else if (window._editor) {
          window._editor.setValue(code);
        }
      }
      function getCode() {
        if (_fallbackMode) return document.getElementById('fallbackTA').value;
        return window._editor ? window._editor.getValue() : _pendingCode;
      }
      function setReadOnly(v) {
        if (_fallbackMode) {
          document.getElementById('fallbackTA').readOnly = v;
        } else if (window._editor) {
          window._editor.updateOptions({ readOnly: v });
        }
      }
    </script>
  </body>
</html>
